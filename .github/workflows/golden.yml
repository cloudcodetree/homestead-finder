name: Golden-Set Regression

on:
  schedule:
    # Weekly on Fridays at 14:00 UTC — enough spread from the
    # Monday discovery cron that they don't contend for runners.
    - cron: '0 14 * * 5'
  workflow_dispatch:

jobs:
  golden:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Refresh fixtures from live sites
        run: |
          cd scraper/tests/fixtures/golden
          curl -sL -A "Mozilla/5.0 Chrome/131" -H "Accept-Encoding: gzip, deflate" \
            --compressed "https://www.landhub.com/land-for-sale/missouri/?page=1" \
            > landhub_mo_page1.html
          curl -sL -A "Mozilla/5.0 Chrome/131" -H "Accept-Encoding: gzip, deflate" \
            --compressed "https://www.mossyoakproperties.com/land-for-sale/arkansas/" \
            > mossyoak_ar.html
          cd ../../..
          python -c "
          from curl_cffi import requests
          r = requests.get(
              'https://sapi.craigslist.org/web/v8/postings/search/full'
              '?batch=100-0-360-0-0&cc=US&lang=en&searchPath=rea&query=land'
              '&purveyor=owner&srchType=T',
              impersonate='chrome131', timeout=20)
          with open('tests/fixtures/golden/craigslist_sapi.json', 'w') as f:
              f.write(r.text)
          "

      - name: Run golden-set regression tests
        run: |
          cd scraper
          python -m pytest tests/test_golden.py -v

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Golden-set drift detected — ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## Scraper parser drift',
              '',
              'The weekly golden-set regression run failed, meaning at least one',
              'source parser no longer produces valid listings from a freshly',
              'captured fixture. A site probably changed its HTML/JSON shape.',
              '',
              `[View failing run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              '### How to fix',
              '1. Check which assertion failed in the run log.',
              '2. Fetch the site manually and diff against the captured fixture.',
              '3. Update the relevant `scraper/sources/*.py` parser.',
              '4. Re-run `python -m pytest tests/test_golden.py` locally to verify.',
              '5. Commit + push. The next weekly run should pass.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['scraper-drift', 'triage'],
            });

name: Scrape Listings

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6am UTC
  workflow_dispatch:        # Allow manual trigger
    inputs:
      dry_run:
        description: 'Dry run (no file writes)'
        type: boolean
        default: false
      source:
        description: 'Run only this source (leave empty for all)'
        type: string
        default: ''
      states:
        description: 'Comma-separated states (leave empty for config default)'
        type: string
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` lets this job commit+push updated listings.
      # `actions: write` is needed for the final "Trigger Pages deploy"
      # step — GitHub's default GITHUB_TOKEN doesn't dispatch other
      # workflows, and pushes made with GITHUB_TOKEN don't trigger
      # workflows listening on `push` either (a deliberate anti-loop
      # safeguard). Without this explicit grant the step 403s with
      # "Resource not accessible by integration".
      contents: write
      actions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Set up Chrome for Selenium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SELENIUM_HEADLESS: 'true'
          # Must match scraper/config.py TARGET_STATES — if the two
          # disagree, the workflow env wins and we scrape the wrong
          # states. Kept explicit here so reviewers see it in PR diffs.
          TARGET_STATES: ${{ github.event.inputs.states || 'MO,AR' }}
        run: |
          cd scraper
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.source }}" ]; then
            ARGS="$ARGS --source=${{ github.event.inputs.source }}"
          fi
          python main.py $ARGS

      - name: Upload AI cost log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-costs
          path: data/ai_costs.json
          if-no-files-found: ignore

      - name: Run saved-search email alerts
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # API Keys 2.0: prefer the `sb_secret_…` secret key. Legacy
          # `SUPABASE_SERVICE_ROLE_KEY` falls through if SUPABASE_SECRET_KEY
          # isn't set, so this works during the transition.
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          cd scraper
          # Never fail the whole job on alerts errors — scraping succeeded,
          # alerts are downstream.
          python -m alerts || echo "alerts step failed but continuing"

      - name: Refit personalization models
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # API Keys 2.0: prefer the `sb_secret_…` secret key. Legacy
          # `SUPABASE_SERVICE_ROLE_KEY` falls through if SUPABASE_SECRET_KEY
          # isn't set, so this works during the transition.
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd scraper
          # Personalization is also downstream of scraping — failures here
          # don't block the commit step.
          python -m rank_fit || echo "rank_fit step failed but continuing"

      - name: Health check + GitHub Actions summary
        if: always()
        run: |
          cd scraper
          # `health_check.py` already runs inside main.py for the alert
          # path; this re-runs it with --json so we can render a
          # markdown summary on the workflow run page. `--json` exits 0
          # even when there are breaches; we still want the summary
          # rendered. Breaches show up as a section in the summary.
          REPORT_JSON=$(python -m health_check --json 2>/dev/null || echo '{}')
          echo "## Scrape health" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$REPORT_JSON" = "{}" ] || [ -z "$REPORT_JSON" ]; then
            echo "_No health report produced (no listings file or first-run baseline)._" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Per-source table.
          echo "| Source | Listings | Geo % | Images % | Hot % |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---:|---:|---:|---:|" >> "$GITHUB_STEP_SUMMARY"
          echo "$REPORT_JSON" | python3 -c '
          import json, sys
          r = json.load(sys.stdin)
          today = r.get("today") or {}
          for src in sorted(today):
              m = today[src]
              print(f"| {src} | {int(m[\"count\"])} | {m[\"geo_pct\"]:.1f}% | {m[\"images_pct\"]:.1f}% | {m[\"hot_pct\"]:.1f}% |")
          ' >> "$GITHUB_STEP_SUMMARY"
          # Breaches block (only if any).
          BREACHES=$(echo "$REPORT_JSON" | python3 -c 'import json,sys; print(len(json.load(sys.stdin).get("breaches") or []))')
          if [ "$BREACHES" != "0" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### ⚠ ${BREACHES} regression(s)" >> "$GITHUB_STEP_SUMMARY"
            echo "$REPORT_JSON" | python3 -c '
          import json, sys
          r = json.load(sys.stdin)
          for b in r.get("breaches") or []:
              print(f"- **{b[\"source\"]}** — {b[\"metric\"]}: {b[\"before\"]:.1f} → {b[\"after\"]:.1f} ({b[\"delta_pct\"]:+.1f}%)")
          ' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit updated listings
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update listings $(date -u +%Y-%m-%d)"

      - name: Push changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: git push

      - name: Trigger Pages deploy
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-pages.yml',
              ref: 'main',
            });

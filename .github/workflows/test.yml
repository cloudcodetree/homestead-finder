name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run ruff lint
        run: |
          cd scraper
          ruff check .
          ruff format --check .

      - name: Check AI vocab TS is up to date
        run: |
          cd scraper
          python -m emit_ts_vocab --check

      - name: Run pytest
        run: |
          cd scraper
          pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript type check
        run: npm run type-check
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: Build
        env:
          GITHUB_PAGES: 'true'
        run: npm run build
        working-directory: frontend

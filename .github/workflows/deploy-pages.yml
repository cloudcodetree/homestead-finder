name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'data/listings.json'
      - 'data/listings_index.json'
      - 'data/curated.json'
      - 'data/homestead_deals.json'
      - 'data/cad_joined.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      # Regenerate the slim listings index + per-id detail files from
      # listings.json. Per-id files are gitignored to avoid 700-file
      # churn per scrape; the index IS committed for local-dev offline
      # browse but we re-shard at deploy time so the two never drift.
      # Idempotent — safe to re-run on every deploy.
      - name: Setup Python (for shard_listings)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Shard listings.json into slim index + per-id detail files
        run: |
          if [ -f data/listings.json ]; then
            cd scraper
            python -m shard_listings \
              --src ../data/listings.json \
              --index-out ../data/listings_index.json \
              --detail-dir ../data/listings
          else
            echo "no data/listings.json — skipping shard step"
          fi

      - name: Build
        env:
          GITHUB_PAGES: 'true'
          # Supabase client env vars — baked into the static bundle at
          # build time. Both values are safe to expose (anon key is
          # designed for public client use; RLS policies gate the DB).
          # If either is unset, AuthButton silently renders nothing and
          # the site works as a read-only public tool.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
        working-directory: frontend

      - name: Copy data to dist
        run: |
          mkdir -p frontend/dist/data
          # Slim index + per-id detail files (sharded above). Browse
          # fetches listings_index.json; PropertyDetail fetches
          # listings/<id>.json on demand. Original listings.json is
          # kept for backwards-compat fallback.
          if [ -f data/listings_index.json ]; then
            cp data/listings_index.json frontend/dist/data/listings_index.json
          fi
          if [ -d data/listings ]; then
            mkdir -p frontend/dist/data/listings
            cp -r data/listings/. frontend/dist/data/listings/
          fi
          if [ -f data/listings.json ]; then
            cp data/listings.json frontend/dist/data/listings.json
          fi
          if [ -f data/curated.json ]; then
            cp data/curated.json frontend/dist/data/curated.json
          fi
          if [ -f data/homestead_deals.json ]; then
            cp data/homestead_deals.json frontend/dist/data/homestead_deals.json
          fi
          # Travis CAD per-listing record map produced by cad_join.py;
          # powers the "County records" panel on PropertyDetail.
          if [ -f data/cad_joined.json ]; then
            cp data/cad_joined.json frontend/dist/data/cad_joined.json
          fi

      # SPA fallback for GitHub Pages: serve index.html for unknown paths.
      # Needed so deep links like /homestead-finder/p/<id> load instead of
      # 404-ing. React Router (BrowserRouter) handles the rest client-side.
      - name: SPA fallback 404.html
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

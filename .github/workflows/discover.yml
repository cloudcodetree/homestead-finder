name: Discover Sources

on:
  schedule:
    # Weekly on Mondays, 04:00 UTC (before the daily scrape at 06:00
    # so reviewers see it first thing Monday morning US-time).
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      max_candidates:
        description: 'Max candidates to probe (each probe = 2 HTTP requests)'
        type: string
        default: '60'
      limit:
        description: 'Top-N candidates surfaced in the issue body'
        type: string
        default: '20'

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run discovery pipeline
        env:
          THROTTLE_MAX_PER_DAY: '500'
        run: |
          cd scraper
          python -m discovery.run \
            --max-candidates="${{ github.event.inputs.max_candidates || '60' }}" \
            --limit="${{ github.event.inputs.limit || '20' }}"

      - name: Upload raw artifacts
        uses: actions/upload-artifact@v4
        with:
          name: discovery-${{ github.run_id }}
          path: data/discovery/
          if-no-files-found: error

      - name: Open GitHub issue with top candidates
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'data/discovery';
            const today = new Date().toISOString().slice(0, 10);
            const mdFile = path.join(dir, `report_${today}.md`);
            if (!fs.existsSync(mdFile)) {
              core.setFailed(`Expected report file not found: ${mdFile}`);
              return;
            }
            const body = fs.readFileSync(mdFile, 'utf8');
            const title = `Source candidates — ${today}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['source-discovery', 'triage'],
            });

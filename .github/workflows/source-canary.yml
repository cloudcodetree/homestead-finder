name: Source Canary

on:
  schedule:
    # Weekly Wednesdays 10:00 UTC — midweek so weekend issue doesn't
    # land in a "won't see it til Monday" inbox.
    - cron: '0 10 * * 3'
  workflow_dispatch:

jobs:
  canary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run canary
        id: canary
        continue-on-error: true
        run: |
          cd scraper
          # Capture report to file for GitHub issue body, but still
          # propagate the exit code so subsequent steps know if any
          # source failed.
          python -m source_canary 2>&1 | tee /tmp/canary-report.md
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> $GITHUB_OUTPUT
          exit $status

      - name: Open issue on failure
        if: steps.canary.outputs.exit_status != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/canary-report.md', 'utf8');
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Source canary — failures on ${today}`,
              body: [
                'One or more sources flipped to a failure state in this',
                "week's canary run. Investigate before tomorrow's scrape.",
                '',
                body,
              ].join('\n'),
              labels: ['source-health', 'triage'],
            });

      - name: Mark workflow failed if canary failed
        if: steps.canary.outputs.exit_status != '0'
        run: exit 1
